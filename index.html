<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNIPER & shot - 行动终端</title>
    <style>
        /* 基础重置，确保无滚动条和边距 */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* 暗黑硬核战术大厅风格 */
        body, html {
            width: 100%; height: 100%;
            background-color: #050608;
            color: #fff;
            /* 统一采用打字机/代码等宽字体 */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: crosshair; /* 全局准星鼠标 */
            touch-action: manipulation;
        }

        /* 模拟 8 倍镜视野暗角，增加压迫感 */
        .scope-vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.95) 85%);
            pointer-events: none; z-index: 10;
        }

        /* 背景辅助瞄准线 (暗红色) */
        .crosshair-x { position: fixed; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255, 50, 50, 0.2); pointer-events: none; z-index: 5; }
        .crosshair-y { position: fixed; top: 0; left: 50%; width: 1px; height: 100%; background: rgba(255, 50, 50, 0.2); pointer-events: none; z-index: 5; }

        /* 主标题：战术档案代号风格 */
        .main-title {
            color: #ff4444;
            font-size: 2.8rem;
            margin-bottom: 60px;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.6);
            z-index: 20;
            border-bottom: 2px dashed #ff4444;
            padding-bottom: 15px;
        }

        /* 选项卡容器 */
        .tabs-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 20;
            padding: 0 20px;
        }

        /* 战术终端按钮基础样式 */
        .tab-btn {
            position: relative;
            background: rgba(15, 15, 15, 0.85);
            color: #4caf50;
            border: 2px solid #4caf50;
            border-radius: 4px; /* 硬核微圆角 */
            padding: 22px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            cursor: crosshair;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 第二个按钮的特殊配色 (区分两个不同的训练场) */
        .btn-action {
            color: #0ea5e9;
            border-color: #0ea5e9;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
        }

        /* 悬停反色与霓虹发光效果 */
        .tab-btn:hover {
            background: #4caf50;
            color: #000;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.6);
            transform: scale(1.05);
        }
        .btn-action:hover {
            background: #0ea5e9;
            color: #000;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.6);
        }

        /* 点击时的物理后坐力反馈 */
        .tab-btn:active { transform: scale(0.95); }
        
        /* 内部全息扫描线动画 */
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255, 255, 255, 0.6); opacity: 0.5;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* 移动端字体适配 */
        @media screen and (max-width: 768px) {
            .main-title { font-size: 2rem; margin-bottom: 40px; }
            .tab-btn { font-size: 1.2rem; padding: 18px; }
            /* 移动端隐藏背景十字线以免画面过乱 */
            .crosshair-x, .crosshair-y { display: none; }
        }
    </style>
</head>
<body>

    <div class="scope-vignette"></div>
    <div class="crosshair-x"></div>
    <div class="crosshair-y"></div>

    <h1 class="main-title">[ SNIPER & SHOT ]</h1>

    <div class="tabs-container">
        <a href="eat-shit/index.html" class="tab-btn">
            <div class="scan-line"></div>
            ▶ TARGET shot
        </a>
        
        <a href="confidential ACTion/index.html" class="tab-btn btn-action">
            <div class="scan-line"></div>
            ▶ confidential ACTion
        </a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>词汇狙击行动 - 跨平台计分版 (1-20章)</title>
    <style>
        /* 基础重置，确保盒模型在手机上不溢出 */
        * { box-sizing: border-box; }
        
        /* 暗黑硬核游戏环境 */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050608; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; cursor: crosshair; 
            touch-action: manipulation; /* 彻底禁用移动端双击缩放 */
        }

        /* 顶部控制台 & 积分板 */
        .top-controls {
            position: absolute; top: 15px; right: 20px; z-index: 50; 
            display: flex; gap: 15px; align-items: center;
        }
        .scoreboard {
            background: rgba(15, 15, 15, 0.95); border: 2px solid #ff9800;
            color: #ccc; padding: 8px 15px; font-size: 18px; font-weight: bold;
            border-radius: 5px; box-shadow: 0 0 15px rgba(255, 152, 0, 0.3);
            display: flex; align-items: center; gap: 10px;
        }
        #score-val { color: #4caf50; font-size: 24px; text-shadow: 0 0 10px #4caf50; }
        #poop-val { color: #ff4444; font-size: 24px; text-shadow: 0 0 10px #ff4444; }

        .btn-control {
            background: rgba(40, 40, 40, 0.9); border: 1px solid #4caf50;
            color: #4caf50; padding: 8px 15px; font-size: 15px; font-weight: bold;
            border-radius: 4px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.2);
        }
        .btn-control:active { transform: scale(0.95); }
        .btn-undo { border-color: #ff9800; color: #ff9800; }

        /* 视野暗角与准星 */
        .scope-vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.95) 85%);
            pointer-events: none; z-index: 10;
        }
        .crosshair-x { position: fixed; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255, 50, 50, 0.6); pointer-events: none; z-index: 12; }
        .crosshair-y { position: fixed; top: 0; left: 50%; width: 1px; height: 100%; background: rgba(255, 50, 50, 0.6); pointer-events: none; z-index: 12; }

        /* 写实枪械 */
        .gun-model {
            position: fixed; bottom: -100px; right: 2%; width: 300px; height: 400px;
            background: linear-gradient(105deg, transparent 40%, #1a1a1a 41%, #2a2a2a 45%, #111 50%),
                        linear-gradient(to right, #000 0%, #333 50%, #000 100%);
            border-top-left-radius: 20px; box-shadow: -10px -10px 30px rgba(0,0,0,0.9);
            pointer-events: none; z-index: 5; transform: scale(0.65) rotate(-15deg);
        }

        /* 左侧情报板 (PC端布局) */
        .intel-panel {
            position: absolute; top: 20px; left: 20px; width: 240px; height: 85vh;
            background: rgba(10, 15, 10, 0.95); border: 1px solid #4caf50;
            border-radius: 2px; padding: 15px; z-index: 20; overflow-y: auto;
        }
        .intel-panel::-webkit-scrollbar { width: 4px; }
        .intel-panel::-webkit-scrollbar-thumb { background: #4caf50; }
        .intel-title {
            color: #4caf50; font-size: 16px; font-weight: bold; text-align: center;
            margin-bottom: 10px; border-bottom: 1px dashed #4caf50; padding-bottom: 10px;
            position: sticky; top: 0; background: rgba(10, 15, 10, 0.95);
        }
        .vocab-list { list-style: none; padding: 0; margin: 0; font-size: 14px; line-height: 1.8; }
        .vocab-item {
            display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer; padding: 4px 5px;
        }
        .vocab-item:active { background: rgba(76, 175, 80, 0.4); }
        .vocab-en { color: #dcdcdc; font-weight: bold; }
        .vocab-zh { color: #888; pointer-events: none; }

        /* 任务主控台 (PC端布局) */
        .mission-panel {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.95); border: 1px solid #333;
            padding: 20px 30px; text-align: left;
            z-index: 20; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.9);
            width: 55%; max-height: 40vh; overflow-y: auto; border-top: 3px solid #ff4444;
        }
        .mission-panel::-webkit-scrollbar { width: 4px; }
        .mission-panel::-webkit-scrollbar-thumb { background: #ff4444; }

        .mission-title { color: #ff4444; font-size: 18px; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }
        .en-paragraph { font-size: 18px; line-height: 1.6; color: #e0e0e0; margin-bottom: 10px; }
        .zh-paragraph { font-size: 14px; line-height: 1.6; color: #888; font-family: 'Microsoft YaHei', sans-serif; }

        .clickable-word { cursor: pointer; border-bottom: 1px dashed transparent; }
        .clickable-word:active { color: #4caf50; border-bottom: 1px dashed #4caf50; }
        .blank-space { display: inline-block; width: 80px; border-bottom: 3px solid #ff4444; margin: 0 5px; vertical-align: bottom; }
        
        .zh-clickable { color: #4caf50; border-bottom: 1px dashed #4caf50; cursor: pointer; margin: 0 2px; }
        .zh-clickable:active { color: #ff9800; border-bottom: 1px dashed #ff9800; }

        /* 标靶区域 (PC端布局) */
        .target-zone {
            position: absolute; top: 60vh; left: 300px; width: calc(100% - 340px);
            display: flex; justify-content: space-evenly; align-items: center; z-index: 30;
        }

        .target-container { perspective: 1000px; width: 110px; height: 120px; cursor: crosshair; user-select: none; }
        .target-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .target-container.flipped .target-inner { transform: rotateY(180deg); }
        .target-container:active:not(.flipped) .target-inner { transform: scale(0.85); transition: transform 0.05s; }

        .target-front, .target-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 2px; display: flex; justify-content: center; align-items: center;
        }
        .target-front { background-color: #d7c9a8; border: 1px solid #8b7d60; box-shadow: 2px 5px 15px rgba(0,0,0,0.9); }
        .target-front::before {
            content: ''; position: absolute; width: 80px; height: 80px; border-radius: 50%;
            background: repeating-radial-gradient(circle, #111 0, #111 10px, #d7c9a8 10px, #d7c9a8 20px); z-index: 1;
        }
        .target-text {
            position: relative; z-index: 2; font-weight: 900; color: #ff2a2a; font-size: 16px;
            text-shadow: 1px 1px 0px #000, -1px -1px 0px #fff; background: rgba(215, 201, 168, 0.9);
            padding: 2px 5px; border-radius: 3px;
        }
        .target-back {
            background-color: #3e2723; border: 2px solid #5d4037; transform: rotateY(180deg);
            flex-direction: column; color: #fff; box-shadow: 2px 5px 15px rgba(0,0,0,0.9);
        }
        .poop-bg { position: absolute; font-size: 50px; opacity: 0.15; z-index: 1; }
        .target-back-content { z-index: 2; text-align: center; }
        .target-back-word { font-size: 14px; font-weight: bold; color: #ffab91; margin-bottom: 3px; }
        .target-back-zh { font-size: 14px; font-weight: bold; }
        .target-penalty { font-size: 10px; color: #ff5252; margin-top: 5px; border: 1px solid #ff5252; padding: 2px; }

        .flying-poop { position: fixed; font-size: 40px; z-index: 100; pointer-events: none; transition: all 0.4s cubic-bezier(0.1, 0.8, 0.3, 1); }
        .ultimate-poop { position: fixed; z-index: 999; pointer-events: none; animation: fallDrop 1s linear forwards; }
        @keyframes fallDrop { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(120vh) rotate(720deg); opacity: 0; } }

        #fireworksCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }

        /* ======================================================== */
        /* 📱 移动端自适应布局 (Mobile Responsive Design) */
        /* ======================================================== */
        @media screen and (max-width: 768px) {
            .top-controls {
                top: 5px; left: 5px; right: 5px; 
                justify-content: space-between; gap: 5px;
            }
            .scoreboard { padding: 4px 10px; font-size: 14px; }
            #score-val, #poop-val { font-size: 16px; }
            .btn-control { padding: 5px 8px; font-size: 12px; }
            
            /* 任务主控台：顶部居中 */
            .mission-panel {
                top: 50px; left: 5%; width: 90%; transform: none; 
                padding: 12px 15px; max-height: 35vh;
            }
            .en-paragraph { font-size: 15px; line-height: 1.5; margin-bottom: 8px; }
            .zh-paragraph { font-size: 13px; line-height: 1.5; }
            .blank-space { width: 60px; }

            /* 战术面板：移至中间，双列显示 */
            .intel-panel {
                top: calc(50px + 35vh + 10px); left: 5%; width: 90%; height: 18vh; 
                padding: 10px;
            }
            .vocab-list { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
            .vocab-item { border-bottom: none; background: rgba(255,255,255,0.08); border-radius: 4px; }
            .intel-title { font-size: 14px; padding-bottom: 5px; margin-bottom: 5px; }

            /* 靶纸区域：底部平铺，允许换行 */
            .target-zone {
                top: calc(50px + 35vh + 10px + 18vh + 10px); left: 0; width: 100%; 
                flex-wrap: wrap; gap: 10px; justify-content: center;
            }
            .target-container { width: 85px; height: 95px; }
            .target-front::before { width: 60px; height: 60px; }
            .target-text { font-size: 13px; padding: 2px 4px; }
            .target-back-word, .target-back-zh { font-size: 13px; }
            .poop-bg { font-size: 35px; }

            /* 隐藏十字准星和枪械，避免在手机上遮挡视线 */
            .crosshair-x, .crosshair-y { display: none; }
            .gun-model { transform: scale(0.3) rotate(-15deg); bottom: -150px; right: -80px; opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="top-controls">
        <div class="scoreboard">
            🎯 <span id="score-val">0</span> | 💩 <span id="poop-val">0</span>
        </div>
        <div style="display:flex; gap:5px;">
            <button class="btn-control btn-undo" onclick="prevLevel()">⏪ 撤回</button>
            <button class="btn-control" onclick="readFullText()">🔊 朗读</button>

    <script>
        // ==========================================
        // 游戏状态 & 音效模块
        // ==========================================
        let currentLevelIndex = 0;
        let currentSpeakingItem = ""; 
        let score = 0;          
        let poopScore = 0;      
        let hasFailedLevel = false; 

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playGunshot() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
            
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter(); noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 1000;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(1, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            
            const osc = audioCtx.createOscillator(); osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            const oscGain = audioCtx.createGain();
            oscGain.gain.setValueAtTime(1, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(oscGain); oscGain.connect(audioCtx.destination);
            
            noise.start(audioCtx.currentTime); osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.2);
        }

        function playSplatSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.2);
        }

        // ==========================================
        // 语音交互系统
        // ==========================================
        function speakWord(word, event) {
            if (event) event.stopPropagation();
            const cleanWord = word.replace(/[^a-zA-Z]/g, '');
            if (!cleanWord) return;

            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel(); 
                if (currentSpeakingItem === cleanWord) { currentSpeakingItem = ""; return; }
            }
            currentSpeakingItem = cleanWord;
            const utterance = new SpeechSynthesisUtterance(cleanWord);
            utterance.lang = 'en-US'; utterance.rate = 0.9;
            utterance.onend = () => { currentSpeakingItem = ""; }; 
            window.speechSynthesis.speak(utterance);
        }

        function readFullText() {
            const levelData = gameLevels[currentLevelIndex];
            const plainText = levelData.paragraphEn.replace(/<[^>]*>/g, " blank ");
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                if (currentSpeakingItem === "FULL_TEXT") { currentSpeakingItem = ""; return; }
            }
            currentSpeakingItem = "FULL_TEXT";
            const utterance = new SpeechSynthesisUtterance(plainText);
            utterance.lang = 'en-US'; utterance.rate = 0.85; 
            utterance.onend = () => { currentSpeakingItem = ""; };
            window.speechSynthesis.speak(utterance);
        }

        function showEnglish(el, enWord, zhWord, event) {
            if(event) event.stopPropagation();
            speakWord(enWord, null);
            if (el.innerText === zhWord) {
                el.innerText = enWord;
                el.style.color = '#ff9800'; el.style.fontWeight = 'bold'; el.style.borderBottom = '1px dashed #ff9800';
                setTimeout(() => {
                    el.innerText = zhWord;
                    el.style.color = ''; el.style.fontWeight = ''; el.style.borderBottom = '';
                }, 2000);
            }
        }

        function processEnForSpeech(htmlString) {
            const tempDiv = document.createElement('div'); tempDiv.innerHTML = htmlString;
            function wrapTextNodes(node) {
                if (node.nodeType === 3) { 
                    const text = node.nodeValue;
                    const newHtml = text.replace(/([a-zA-Z]+)/g, "<span class='clickable-word' onclick=\"speakWord('$1', event)\">$1</span>");
                    const wrapper = document.createElement('span'); wrapper.innerHTML = newHtml;
                    node.parentNode.replaceChild(wrapper, node);
                } else if (node.nodeType === 1 && !node.classList.contains('blank-space')) {
                    Array.from(node.childNodes).forEach(wrapTextNodes);
                }
            }
            Array.from(tempDiv.childNodes).forEach(wrapTextNodes);
            return tempDiv.innerHTML;
        }

        function processZhForClick(text, intel) {
            let dict = [];
            intel.forEach(w => {
                w.zh.split(/[、，。]/).forEach(part => {
                    part = part.trim();
                    if(part.length > 0) dict.push({ en: w.en, zh: part });
                });
            });
            dict.sort((a,b) => b.zh.length - a.zh.length); 
            let res = text;
            dict.forEach(item => {
                let parts = res.split(/(<[^>]*>)/);
                for(let i=0; i<parts.length; i++) {
                    if(!parts[i].startsWith('<')) {
                        parts[i] = parts[i].split(item.zh).join(`<span class="zh-clickable" onclick="showEnglish(this, '${item.en}', '${item.zh}', event)">${item.zh}</span>`);
                    }
                }
                res = parts.join('');
            });
            return res;
        }

        // ==========================================
        // 关卡加载 & 积分更新
        // ==========================================
        function updateScoreboard() {
            document.getElementById('score-val').innerText = score;
            document.getElementById('poop-val').innerText = poopScore;
        }

        function loadLevel(index) {
            if (index < 0) index = 0;
            currentLevelIndex = index;
            window.speechSynthesis.cancel(); 
            currentSpeakingItem = "";
            hasFailedLevel = false; 
            
            const levelData = gameLevels[index];
            const processedEn = processEnForSpeech(levelData.paragraphEn);
            const processedZh = processZhForClick(levelData.paragraphZh, levelData.intel);
            
            document.getElementById('mission-panel').innerHTML = `
                <div class="mission-title">[ ${levelData.codeName} ]</div>
                <div class="en-paragraph">${processedEn}</div>
                <hr style="border-color:#333; margin:10px 0;" />
                <div class="zh-paragraph">${processedZh}</div>
            `;

            const intelList = document.getElementById('intel-list');
            intelList.innerHTML = ''; 
            levelData.intel.forEach(word => {
                intelList.innerHTML += `
                <li class="vocab-item" onclick="speakWord('${word.en}', event)">
                    <span class="vocab-en">${word.en}</span> <span class="vocab-zh">${word.zh}</span>
                </li>`;
            });

            const targetZone = document.getElementById('target-zone');
            targetZone.innerHTML = ''; 
            const shuffledOptions = levelData.options.sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach((option, i) => {
                let zhMeaning = "未知";
                const found = levelData.intel.find(w => w.en === option);
                if (found) zhMeaning = found.zh;

                targetZone.innerHTML += `
                <div class="target-container" id="target-${i}" onclick="shoot('${option}', ${i}, event)">
                    <div class="target-inner">
                        <div class="target-front"><span class="target-text">${option}</span></div>
                        <div class="target-back">
                            <span class="poop-bg">💩</span>
                            <div class="target-back-content">
                                <div class="target-back-word">${option}</div>
                                <div class="target-back-zh">${zhMeaning}</div>
                                <div class="target-penalty">惩罚: 吃屎</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        }

        function prevLevel() { if (currentLevelIndex > 0) loadLevel(currentLevelIndex - 1); }

        // ==========================================
        // 核心射击 & 终极结算
        // ==========================================
        function shoot(word, targetIndex, event) {
            const levelData = gameLevels[currentLevelIndex];
            const targetEl = document.getElementById(`target-${targetIndex}`);
            
            if (targetEl.classList.contains('flipped')) return; 

            playGunshot(); 

            if (word === levelData.correctAnswer) {
                if (!hasFailedLevel) { score++; updateScoreboard(); }

                createFireworks(event.clientX, event.clientY);
                speakWord(word, null); 
                
                const blankSpan = document.querySelector('.blank-space');
                if(blankSpan) blankSpan.outerHTML = `<span style="color:#4caf50; font-weight:bold; border-bottom: 2px solid #4caf50; padding: 0 5px;">${word}</span>`;
                
                setTimeout(() => {
                    currentLevelIndex++;
                    if(currentLevelIndex < gameLevels.length) { loadLevel(currentLevelIndex); } 
                    else { triggerEndGame(); }
                }, 1500); 

            } else {
                if (!hasFailedLevel) { poopScore++; updateScoreboard(); hasFailedLevel = true; }
                speakWord(word, null); 
                throwPoopAnimation(event.clientX, event.clientY, targetEl);
            }
        }

        function throwPoopAnimation(targetX, targetY, targetEl) {
            const poop = document.createElement('div');
            poop.className = 'flying-poop'; poop.innerText = '💩';
            poop.style.left = '50vw'; poop.style.top = '100vh';
            document.body.appendChild(poop);

            requestAnimationFrame(() => {
                poop.style.left = (targetX - 20) + 'px'; poop.style.top = (targetY - 20) + 'px';
                poop.style.transform = 'scale(1.5) rotate(360deg)';
            });

            setTimeout(() => { poop.remove(); targetEl.classList.add('flipped'); playSplatSound(); }, 400); 
        }

        function triggerEndGame() {
            document.getElementById('target-zone').innerHTML = ''; 
            document.getElementById('intel-list').innerHTML = '';
            
            if (score > poopScore) {
                document.getElementById('mission-panel').innerHTML = "<div style='color:#4caf50; font-size: 26px; text-align:center; padding: 40px 0;'>🎉 完美通关！<br><br>得分超越吃屎分，享受属于你的荣耀！</div>";
                triggerVictorySequence();
            } else {
                document.getElementById('mission-panel').innerHTML = "<div style='color:#ff4444; font-size: 26px; text-align:center; padding: 40px 0;'>💀 任务失败！<br><br>吃屎分超标，准备接受终极极刑！</div>";
                triggerUltimatePoop();
            }
        }

        function triggerVictorySequence() {
            let endTime = Date.now() + 60000; 
            let fwInterval = setInterval(() => {
                if(Date.now() > endTime) { clearInterval(fwInterval); return; }
                createFireworks(window.innerWidth * Math.random(), window.innerHeight * Math.random() * 0.6);
            }, 800);

            const praises = ["太棒了！你的英语词汇量简直无敌！", "Excellent shooting, commander! You are a genius!", "完美通关，你是全场最靓的仔！", "Amazing! You have successfully learned all the words!", "得分超越吃屎分，你就是真正的狙击之王！"];
            let praiseIndex = 0;
            
            function speakNextPraise() {
                if(Date.now() > endTime) return;
                let p = praises[praiseIndex % praises.length];
                praiseIndex++;
                let u = new SpeechSynthesisUtterance(p);
                u.lang = p.match(/[a-zA-Z]/) ? 'en-US' : 'zh-CN';
                u.onend = () => { setTimeout(speakNextPraise, 1500); };
                window.speechSynthesis.speak(u);
            }
            speakNextPraise();
        }

        function triggerUltimatePoop() {
            let endTime = Date.now() + 10000; 
            let poopInterval = setInterval(() => {
                if(Date.now() > endTime) { clearInterval(poopInterval); return; }
                let p = document.createElement('div');
                p.className = 'ultimate-poop'; p.innerText = '💩';
                p.style.fontSize = (Math.random() * 80 + 50) + 'px';
                p.style.left = (Math.random() * window.innerWidth) + 'px';
                p.style.top = '-150px';
                document.body.appendChild(p);
                playSplatSound();
                setTimeout(() => p.remove(), 1000); 
            }, 100);
        }

        // ==========================================
        // 烟花特效系统
        // ==========================================
        const canvas = document.getElementById('fireworksCanvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight; let particles = [];
        function createFireworks(x, y) {
            const colors = ['#ff0000', '#00ff00', '#ffff00', '#ff00ff', '#ffffff', '#ff8800'];
            for (let i = 0; i < 150; i++) {
                particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 30, vy: (Math.random() - 0.5) * 30, color: colors[Math.floor(Math.random() * colors.length)], life: 1, decay: Math.random() * 0.015 + 0.01 });
            }
            animateFireworks();
        }
        function animateFireworks() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); let activeParticles = false;
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                if (p.life > 0) {
                    activeParticles = true; p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life -= p.decay;
                    ctx.globalAlpha = Math.max(0, p.life); ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill();
                }
            }
            if (activeParticles) { requestAnimationFrame(animateFireworks); } else { ctx.clearRect(0, 0, canvas.width, canvas.height); particles = []; }
        }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        window.onload = () => { loadLevel(currentLevelIndex); };
    </script>
</body>
</html>
